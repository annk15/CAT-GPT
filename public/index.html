<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <title>CAT-GPT — Misse katten</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <header class="header">
        <h1 class="title">Misse</h1>
        <p class="subtitle" id="status">Tryck knappen och prata!</p>
      </header>

      <section class="stage" aria-live="polite">
        <div class="cat-wrap" id="cat">
          <article class="kawaii-cat" role="img" aria-labelledby="cat-alt">
            <div class="cat-alt" id="cat-alt">En söt kawaii-katt som pratar med dig</div>
            <div class="shadow"></div>
            <div class="tail"></div>
            <div class="body">
              <div class="leg"></div>
              <div class="leg"></div>
              <div class="paw"></div>
              <div class="paw"></div>
            </div>
            <div class="head">
              <div class="ear"></div>
              <div class="ear"></div>
              <div class="face">
                <div class="whisker"></div>
                <div class="whisker"></div>
                <div class="whisker"></div>
                <div class="whisker"></div>
                <div class="eye"></div>
                <div class="eye"></div>
                <div class="nose"></div>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section class="controls">
        <button
          class="talk-button"
          id="talkButton"
          type="button"
          aria-label="Prata med Misse katten"
        >
          <span class="talk-button-icon" aria-hidden="true">🎤</span>
          <span class="talk-button-label" id="talkButtonLabel">Prata med Misse!</span>
        </button>
      </section>
    </main>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
